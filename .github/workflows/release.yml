name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.id }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate commit summary
        id: commits
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${{ github.ref_name }}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            RANGE="$PREV_TAG..${{ github.ref_name }}"
          else
            RANGE="${{ github.ref_name }}"
          fi
          NOTES=$(git log "$RANGE" --pretty=format:"- %s (%h)" --no-merges)
          echo "PREV_TAG=$PREV_TAG" >> $GITHUB_ENV
          {
            echo 'NOTES<<EOF'
            echo "$NOTES"
            echo 'EOF'
          } >> $GITHUB_ENV

      - name: Create release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Changes since ${{ env.PREV_TAG }}

            ${{ env.NOTES }}

  build-deb:
    needs: create-release
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y libssl-dev libyaml-dev

      - name: Build deb
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          make deb DEB_ARCH=${{ matrix.arch }} DEB_VERSION=$VERSION

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/*.deb

  build-rpm:
    needs: create-release
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y libssl-dev libyaml-dev rpm

      - name: Build rpm
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          RPM_VER="${VERSION%%-*}"
          RPM_REL="${VERSION#*-}"
          if [ "$RPM_REL" = "$VERSION" ]; then RPM_REL="1"; fi
          make rpm RPM_VERSION=$RPM_VER RPM_RELEASE=$RPM_REL

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/rpm/RPMS/**/*.rpm
