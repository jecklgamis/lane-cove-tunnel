name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-deb:
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y libssl-dev libyaml-dev

      - name: Build deb
        run: make deb DEB_ARCH=${{ matrix.arch }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/*.deb

  build-rpm:
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y libssl-dev libyaml-dev rpm

      - name: Build rpm
        run: make rpm

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/rpm/RPMS/**/*.rpm
